version: '3.9'

services:
  divisionx:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @divisionx/divisionx dev -- --hostname 0.0.0.0"
    environment:
      - CORE_API_BASE_URL=http://core-api:5000
    ports:
      - '3000:3000'
    depends_on:
      - core-api

  happywedding-web:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @divisionx/happywedding-web dev -- --hostname 0.0.0.0"
    ports:
      - '3001:3000'

  wolfcasa-web:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @divisionx/wolfcasa-web dev -- --hostname 0.0.0.0"
    ports:
      - '3002:3000'

  thetime:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @divisionx/thetime dev -- --hostname 0.0.0.0"
    ports:
      - '3003:3000'

  core-api:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @divisionx/core-api dev"
    environment:
      - CORE_API_PORT=5000
    ports:
      - '5000:5000'
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: divisionx

  redis:
    image: redis:7
